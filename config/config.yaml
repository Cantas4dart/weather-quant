runtime:
  timezone: UTC
  scan_interval_seconds: 180
  profit_scan_interval_seconds: 300
  min_alert_cooldown_minutes: 45
  dry_run: true
  manual_trading: true
  log_alerts: true
  database_path: data/weather_quant.db
  log_path: logs/weather_quant.log

polymarket:
  gamma_api: https://gamma-api.polymarket.com
  clob_api: https://clob.polymarket.com
  weather_query_terms:
    - highest temperature
    - daily high temperature
    - temperature in
  min_liquidity_usd: 50
  max_yes_price_for_longshot: 0.10
  min_longshot_edge_multiple: 2.0
  min_target_payout_multiple: 10.0
  near_certainty_min_prob: 0.93
  near_certainty_min_price: 0.86
  near_certainty_max_price: 0.99

strategy:
  micro_longshot:
    enabled: true
    min_model_probability: 0.045
    price_floor: 0.02
    price_ceiling: 0.10
    min_expected_value: 0.20
  late_day_reversal:
    enabled: true
    window_start_hours_before_close: 8
    window_end_hours_before_close: 0
    min_reversal_score: 0.66
    leader_min_price: 0.45
  near_certainty:
    enabled: true
    min_model_probability: 0.94
    min_edge: 0.025
  profit_taking:
    enabled: true
    profit_percent_levels: [200, 400, 900]
    de_risk_price: 0.70
    exit_price: 0.90
    stop_loss_price: 0.35
    max_loss_percent: 55
    hard_stop_price: 0.18

